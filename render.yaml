services:
  - type: web
    name: freepdf-api
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build:api
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: REDIS_URL
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        value: pdf-files
      - key: GEMINI_API_KEY
        sync: false

  - type: web
    name: freepdf-pdf-processor
    runtime: docker
    plan: free
    dockerfilePath: ./services/pdf-processor/Dockerfile
    dockerContext: ./services/pdf-processor
    healthCheckPath: /health
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_BUCKET
        value: pdf-files
      - key: NODE_API_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
